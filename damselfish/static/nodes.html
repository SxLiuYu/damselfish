<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Damselfish 节点管理</title>
  <style>
    :root { color-scheme: dark; --bg:#07111f; --panel:#0d1b2d; --line:#203754; --text:#edf6ff; --muted:#8da5c0; --cyan:#3ddbd9; --green:#59e391; --red:#ff6b7d; --amber:#ffca63; }
    * { box-sizing:border-box; }
    body { margin:0; font:15px/1.5 ui-sans-serif,system-ui,-apple-system,"PingFang SC",sans-serif; color:var(--text); background:radial-gradient(circle at 10% 0,#123252 0,transparent 38%),var(--bg); min-height:100vh; }
    .shell { max-width:1180px; margin:auto; padding:36px 20px 64px; }
    header { display:flex; justify-content:space-between; gap:20px; align-items:end; margin-bottom:24px; }
    h1 { margin:0; font-size:clamp(28px,5vw,48px); letter-spacing:-.04em; }
    h1 span { color:var(--cyan); }
    .subtitle,.muted { color:var(--muted); }
    .status { padding:8px 12px; border:1px solid var(--line); border-radius:999px; white-space:nowrap; }
    .grid { display:grid; grid-template-columns:1fr 1.25fr; gap:20px; }
    .panel { background:rgba(13,27,45,.9); border:1px solid var(--line); border-radius:18px; padding:20px; box-shadow:0 22px 70px rgba(0,0,0,.25); }
    .panel h2 { margin:0 0 14px; font-size:18px; }
    label { display:block; color:var(--muted); font-size:13px; margin:12px 0 6px; }
    input,select { width:100%; border:1px solid var(--line); border-radius:10px; padding:11px 12px; color:var(--text); background:#091525; outline:none; }
    input:focus,select:focus { border-color:var(--cyan); box-shadow:0 0 0 3px rgba(61,219,217,.12); }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .checks { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
    .check { display:flex; gap:6px; align-items:center; padding:7px 9px; background:#091525; border:1px solid var(--line); border-radius:9px; color:var(--text); font-size:13px; }
    .check input { width:auto; margin:0; accent-color:var(--cyan); }
    .actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; }
    button { border:0; border-radius:10px; padding:10px 14px; color:#041018; background:var(--cyan); font-weight:700; cursor:pointer; }
    button.secondary { color:var(--text); background:#19304b; }
    button.danger { color:white; background:#8c3040; }
    button:disabled { opacity:.45; cursor:not-allowed; }
    .auth { display:flex; gap:8px; margin-bottom:18px; }
    .auth input { flex:1; }
    .nodes { display:grid; gap:10px; }
    .node { border:1px solid var(--line); border-radius:13px; padding:14px; background:#091525; }
    .node-top { display:flex; justify-content:space-between; align-items:start; gap:12px; }
    .node h3 { margin:0; font-size:16px; }
    .badges { display:flex; flex-wrap:wrap; gap:6px; margin-top:9px; }
    .badge { padding:3px 7px; border-radius:999px; background:#17304b; color:#bcd3e9; font-size:11px; }
    .badge.ok { color:var(--green); background:#123c31; }
    .badge.off { color:var(--amber); background:#44351b; }
    .node-buttons { display:flex; gap:6px; }
    .node-buttons button { padding:7px 9px; font-size:12px; }
    .endpoint { margin-top:10px; padding:9px 10px; border-radius:9px; background:#07111f; overflow-wrap:anywhere; }
    .endpoint strong { display:block; color:var(--muted); font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.06em; }
    .model-list { display:grid; gap:8px; margin-top:12px; }
    .model-item { padding:11px; border:1px solid #1b334e; border-radius:10px; background:#0c1a2b; }
    .model-head { display:flex; justify-content:space-between; gap:10px; align-items:center; }
    .model-id { font-weight:700; color:#dffefd; overflow-wrap:anywhere; }
    .model-meta { color:var(--muted); font-size:12px; margin-top:6px; overflow-wrap:anywhere; }
    .model-error { margin-top:12px; color:var(--red); }
    .result { margin-top:14px; padding:12px; border-radius:10px; background:#091525; border:1px solid var(--line); min-height:48px; white-space:pre-wrap; overflow-wrap:anywhere; }
    .result.ok { border-color:#286c4b; color:var(--green); }
    .result.error { border-color:#843444; color:var(--red); }
    .empty { padding:28px; text-align:center; color:var(--muted); border:1px dashed var(--line); border-radius:12px; }
    code { color:#b9f4f3; }
    @media (max-width:820px) { .grid { grid-template-columns:1fr; } header { align-items:start; flex-direction:column; } .row { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<main class="shell">
  <header>
    <div><div class="subtitle">BEIJING CLOUD · MODEL POOL</div><h1>Damselfish <span>节点管理</span></h1><div class="subtitle">添加、测试和热更新 OpenAI 兼容免费模型节点</div></div>
    <div class="status" id="serverStatus">未验证</div>
  </header>
  <div class="panel auth" id="loginPanel">
    <input id="serviceKey" type="password" autocomplete="current-password" placeholder="输入北京 Damselfish 访问 Key">
    <button id="connectButton">登录</button>
  </div>
  <div class="actions" style="justify-content:flex-end;margin:0 0 12px"><button class="secondary" id="logoutButton" hidden>退出登录</button></div>
  <section class="grid">
    <div class="panel">
      <h2 id="formTitle">添加云端节点</h2>
      <form id="nodeForm">
        <div class="row"><div><label>节点 ID</label><input id="nodeId" required placeholder="agnes-2.5-flash"></div><div><label>显示名称</label><input id="label" required placeholder="Agnes 2.5 Flash"></div></div>
        <label>OpenAI 兼容 Base URL</label><input id="baseUrl" required type="url" placeholder="https://provider.example.com/v1">
        <div class="row"><div><label>模型 ID</label><input id="model" required placeholder="agnes-2.5-flash" list="modelOptions"><datalist id="modelOptions"></datalist></div><div><label>上游 API Key</label><input id="apiKey" type="password" autocomplete="new-password" placeholder="编辑时留空表示保持原 Key"></div></div>
        <div class="row"><div><label>优先级（数字越小越优先）</label><input id="priority" type="number" min="0" max="10000" value="100"></div><div><label>最大并发</label><input id="maxConcurrency" type="number" min="1" max="100" value="4"></div></div>
        <label>能力标签</label><div class="checks" id="capabilities"></div>
        <div class="checks"><label class="check"><input id="enabled" type="checkbox" checked> 启用节点</label><label class="check"><input id="free" type="checkbox" checked> 免费节点</label><label class="check"><input id="probe" type="checkbox" checked> 后台探测</label></div>
        <div class="actions"><button type="button" class="secondary" id="discoverButton">获取模型列表</button><button type="button" class="secondary" id="testButton">测试连接</button><button type="submit" id="saveButton">测试并保存</button><button type="button" class="secondary" id="resetButton">清空</button></div>
      </form>
      <div class="result" id="result">请先输入北京服务 Key 并验证。</div>
    </div>
    <div class="panel"><h2>当前模型节点与具体模型</h2><div class="nodes" id="nodes"><div class="empty">验证后显示节点</div></div></div>
  </section>
</main>
<script>
const capabilities = ['chat','chinese','multilingual','tools','coding','reasoning','creative','fast','vision'];
const capabilityBox = document.querySelector('#capabilities');
capabilities.forEach((name) => capabilityBox.insertAdjacentHTML('beforeend', `<label class="check"><input type="checkbox" value="${name}" ${['chat','chinese','fast'].includes(name)?'checked':''}> ${name}</label>`));
const $ = (selector) => document.querySelector(selector);
let editingId = null;
function headers() { return {'Content-Type':'application/json'}; }
function payload() { return {id:$('#nodeId').value.trim(),label:$('#label').value.trim(),base_url:$('#baseUrl').value.trim(),model:$('#model').value.trim(),api_key:$('#apiKey').value.trim(),priority:Number($('#priority').value),max_concurrency:Number($('#maxConcurrency').value),enabled:$('#enabled').checked,free:$('#free').checked,probe:$('#probe').checked,capabilities:[...capabilityBox.querySelectorAll('input:checked')].map(x=>x.value)}; }
function show(message, ok=null) { const box=$('#result'); box.textContent=message; box.className='result'+(ok===true?' ok':ok===false?' error':''); }
async function api(path, options={}) { const response=await fetch(path,{credentials:'same-origin',...options,headers:{...headers(),...(options.headers||{})}}); let body; try { body=await response.json(); } catch { body={detail:await response.text()}; } if(!response.ok) throw new Error(body.detail || body.error?.message || `HTTP ${response.status}`); return body; }
async function loadNodes() { try { const body=await api('./api/nodes'); $('#loginPanel').hidden=true; $('#logoutButton').hidden=false; $('#serverStatus').textContent=`已登录 · ${body.data.length} 个节点`; $('#serverStatus').style.color='var(--green)'; renderNodes(body.data); show('北京服务 Key 验证成功，正在加载每个节点的具体模型。',true); await Promise.allSettled(body.data.map(n=>loadNodeModels(n.id))); } catch(error) { $('#serverStatus').textContent='验证失败'; $('#serverStatus').style.color='var(--red)'; show(error.message,false); } }
function renderNodes(nodes) { const box=$('#nodes'); if(!nodes.length){box.innerHTML='<div class="empty">还没有模型节点</div>';return;} box.innerHTML=nodes.map(n=>`<article class="node"><div class="node-top"><div><h3>${escapeHtml(n.label)}</h3><div class="muted"><code>${escapeHtml(n.id)}</code> · 当前配置模型 ${escapeHtml(n.model)}</div></div><div class="node-buttons"><button class="secondary" onclick="loadNodeModels('${escapeAttr(n.id)}')">刷新模型</button>${n.managed?`<button class="secondary" onclick="editNode('${escapeAttr(n.id)}')">编辑</button><button class="danger" onclick="deleteNode('${escapeAttr(n.id)}')">删除</button>`:''}</div></div><div class="badges"><span class="badge ${n.available?'ok':'off'}">${n.available?'可用':'不可用'}</span><span class="badge">优先级 ${n.priority}</span><span class="badge">${n.has_api_key?'已配置 Key':'无 Key'}</span>${n.capabilities.map(c=>`<span class="badge">${escapeHtml(c)}</span>`).join('')}</div><div class="endpoint"><strong>模型列表 URL</strong><code>${escapeHtml(n.models_url)}</code></div><div class="endpoint"><strong>聊天请求 URL</strong><code>${escapeHtml(n.chat_url)}</code></div><div class="model-list" id="${modelContainerId(n.id)}"><div class="muted">正在读取具体模型…</div></div></article>`).join(''); window.nodeData=Object.fromEntries(nodes.map(n=>[n.id,n])); }
async function loadNodeModels(id) { const box=document.getElementById(modelContainerId(id)); if(!box)return; box.innerHTML='<div class="muted">正在读取具体模型…</div>'; try { const body=await api(`./api/nodes/${encodeURIComponent(id)}/models`); if(!body.success){throw new Error(`HTTP ${body.status} · ${body.message||'无法获取模型列表'}`);} if(!body.model_details.length){box.innerHTML='<div class="muted">上游返回了空模型列表</div>';return;} box.innerHTML=body.model_details.map(model=>`<div class="model-item"><div class="model-head"><code class="model-id">${escapeHtml(model.id)}</code><span class="badge ${model.automatic?'off':''}">${model.automatic?'自动路由':'具体模型'}</span></div><div class="model-meta">实际供应商：${escapeHtml(model.provider)}</div><div class="model-meta">客户端接入 Base URL：<code>${escapeHtml(model.access_base_url)}</code></div><div class="model-meta">客户端请求 URL：<code>${escapeHtml(model.access_chat_url)}</code></div><div class="model-meta">实际上游 Base URL：${model.upstream_base_url?`<code>${escapeHtml(model.upstream_base_url)}</code>`:'请求时由路由动态选择'}</div><div class="model-meta">实际上游请求 URL：${model.upstream_chat_url?`<code>${escapeHtml(model.upstream_chat_url)}</code>`:'请求时由路由动态选择'}</div><div class="model-meta">请求体模型值：<code>"model": "${escapeHtml(model.id)}"</code></div></div>`).join(''); } catch(error) { box.innerHTML=`<div class="model-error">无法获取模型列表：${escapeHtml(error.message)}</div>`; } }
function modelContainerId(id){return `models-${encodeURIComponent(id)}`;}
window.editNode=(id)=>{const n=window.nodeData[id]; editingId=id; $('#formTitle').textContent=`编辑 ${n.label}`; $('#nodeId').value=n.id; $('#nodeId').disabled=true; $('#label').value=n.label; $('#baseUrl').value=n.base_url; $('#model').value=n.model; $('#apiKey').value=''; $('#priority').value=n.priority; $('#maxConcurrency').value=n.max_concurrency; $('#enabled').checked=n.enabled; $('#free').checked=n.free; $('#probe').checked=n.probe; capabilityBox.querySelectorAll('input').forEach(x=>x.checked=n.capabilities.includes(x.value)); show('编辑节点时 API Key 留空，将保留服务器已有 Key。'); scrollTo({top:0,behavior:'smooth'});};
window.deleteNode=async(id)=>{if(!confirm(`确定删除节点 ${id}？`))return;try{await api(`./api/nodes/${encodeURIComponent(id)}`,{method:'DELETE'});show(`节点 ${id} 已删除。`,true);resetForm();await loadNodes();}catch(error){show(error.message,false);}};
async function runTest(discover=false) { show(discover?'正在获取模型列表…':'正在测试连接…'); const body=await api(discover?'./api/nodes/discover':'./api/nodes/test',{method:'POST',body:JSON.stringify(payload())}); if(discover){$('#modelOptions').innerHTML=body.models.map(m=>`<option value="${escapeAttr(m)}"></option>`).join('');show(`获取成功：${body.models.length} 个模型，耗时 ${body.latency_ms} ms`,true);}else{show(`${body.success?'测试成功':'测试失败'} · HTTP ${body.status} · ${body.latency_ms||'-'} ms\n${body.message||''}`,body.success); } return body; }
$('#connectButton').onclick=async()=>{try{await api('./login',{method:'POST',body:JSON.stringify({key:$('#serviceKey').value})});$('#serviceKey').value='';await loadNodes();}catch(error){show(error.message,false);}};
$('#serviceKey').addEventListener('keydown',(event)=>{if(event.key==='Enter')$('#connectButton').click();});
$('#logoutButton').onclick=async()=>{await api('./logout',{method:'POST'});$('#loginPanel').hidden=false;$('#logoutButton').hidden=true;$('#serverStatus').textContent='未登录';$('#nodes').innerHTML='<div class="empty">登录后显示节点</div>';show('已安全退出。');};
$('#testButton').onclick=()=>runTest(false).catch(e=>show(e.message,false));
$('#discoverButton').onclick=()=>runTest(true).catch(e=>show(e.message,false));
$('#nodeForm').onsubmit=async(event)=>{event.preventDefault();try{const tested=await runTest(false);if(!tested.success)throw new Error('连接测试未通过，未保存节点');const path=editingId?`./api/nodes/${encodeURIComponent(editingId)}`:'./api/nodes';await api(path,{method:editingId?'PUT':'POST',body:JSON.stringify(payload())});show('节点已安全保存并立即加入路由。',true);resetForm();await loadNodes();}catch(error){show(error.message,false);}};
$('#resetButton').onclick=resetForm;
function resetForm(){editingId=null;$('#nodeForm').reset();$('#nodeId').disabled=false;$('#priority').value=100;$('#maxConcurrency').value=4;$('#enabled').checked=$('#free').checked=$('#probe').checked=true;capabilityBox.querySelectorAll('input').forEach(x=>x.checked=['chat','chinese','fast'].includes(x.value));$('#formTitle').textContent='添加云端节点';}
function escapeHtml(v){return String(v).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));} function escapeAttr(v){return escapeHtml(v).replace(/`/g,'&#96;');}
loadNodes().catch(()=>{});
</script>
</body>
</html>
